name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java for Android
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get dependencies
        run: flutter pub get

      - name: Flutter version
        run: flutter --version

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: |
          flutter build apk --debug 2>&1
          echo "Exit code: $?"

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --release --no-codesign 2>&1 || echo "BUILD_EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Create iOS IPA
        if: matrix.platform == 'ios'
        run: |
          mkdir -p build/ios/ipa
          if [ -d "build/ios/iphoneos/Runner.xcarchive" ]; then
            xcodebuild -exportArchive \
              -archivePath build/ios/iphoneos/Runner.xcarchive \
              -exportOptionsPlist build/ios/ExportOptions.plist \
              -exportPath build/ios/ipa \
              -allowProvisioningUpdates NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO 2>&1 || echo "IPA creation failed, using archive"
          fi
          ls -la build/ios/iphoneos/

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Debug - List build outputs
        run: |
          echo "=== Build outputs ==="
          if [ "${{ matrix.platform }}" = "android" ]; then
            ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
          fi
          if [ "${{ matrix.platform }}" = "ios" ]; then
            ls -la build/ios/iphoneos/ 2>/dev/null || echo "No iOS directory"
          fi
          if [ "${{ matrix.platform }}" = "windows" ]; then
            ls -la build/windows/x64/Release/bundle/ 2>/dev/null || echo "No Windows directory"
          fi
          if [ "${{ matrix.platform }}" = "linux" ]; then
            ls -la build/linux/x64/release/bundle/ 2>/dev/null || echo "No Linux directory"
          fi
          if [ "${{ matrix.platform }}" = "macos" ]; then
            ls -la build/macos/Build/Products/Release/ 2>/dev/null || echo "No macOS directory"
          fi

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/Release/bundle

      - name: Upload iOS Archive
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.xcarchive

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/udyatstream_app.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows

      - name: Download iOS Archive
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/ios

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/macos

      - name: List downloaded files
        run: |
          echo "=== Release files ==="
          ls -la release/
          echo ""
          echo "=== Android ==="
          ls -la release/android/ 2>/dev/null || echo "No android"
          echo ""
          echo "=== Windows ==="
          ls -la release/windows/ 2>/dev/null || echo "No windows"
          echo ""
          echo "=== iOS ==="
          ls -la release/ios/ 2>/dev/null || echo "No ios"
          echo ""
          echo "=== Linux ==="
          ls -la release/linux/ 2>/dev/null || echo "No linux"
          echo ""
          echo "=== macOS ==="
          ls -la release/macos/ 2>/dev/null || echo "No macos"

      - name: Create Windows zip
        run: |
          if [ -d "release/windows" ] && [ "$(ls -A release/windows)" ]; then
            cd release/windows
            zip -r ../../UDYATSTREAM-windows.zip .
            echo "Windows ZIP created"
          else
            echo "Windows: No files to zip"
          fi

      - name: Create Linux zip
        run: |
          if [ -d "release/linux" ] && [ "$(ls -A release/linux)" ]; then
            cd release/linux
            zip -r ../../UDYATSTREAM-linux.zip .
            echo "Linux ZIP created"
          else
            echo "Linux: No files to zip"
          fi

      - name: Create macOS zip
        run: |
          if [ -d "release/macos" ] && [ "$(ls -A release/macos)" ]; then
            cd release/macos
            zip -r ../../UDYATSTREAM-macos.zip .
            echo "macOS ZIP created"
          else
            echo "macOS: No files to zip"
          fi

      - name: Create iOS IPA
        run: |
          if [ -d "release/ios" ] && [ "$(ls -A release/ios)" ]; then
            cd release/ios
            zip -r ../../UDYATSTREAM-ios.ipa .
            echo "iOS IPA created"
          else
            echo "iOS: No files"
          fi

      - name: Rename Android APK if needed
        run: |
          if [ -f "release/android/app-debug.apk" ]; then
            cp release/android/app-debug.apk UDYATSTREAM-android.apk
            echo "Android APK copied"
          fi

      - name: List final artifacts
        run: |
          echo "=== Final artifacts ==="
          ls -la *.zip *.apk 2>/dev/null || echo "Checking files..."
          [ -f "UDYATSTREAM-android.apk" ] && echo "Android: OK" || echo "Android: MISSING"
          [ -f "UDYATSTREAM-windows.zip" ] && echo "Windows: OK" || echo "Windows: MISSING"
          [ -f "UDYATSTREAM-ios.ipa" ] && echo "iOS: OK" || echo "iOS: MISSING"
          [ -f "UDYATSTREAM-linux.zip" ] && echo "Linux: OK" || echo "Linux: MISSING"
          [ -f "UDYATSTREAM-macos.zip" ] && echo "macOS: OK" || echo "macOS: MISSING"

      - name: Delete existing release
        run: |
          curl -s -X DELETE -H "Authorization: token ${{ secrets.TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v1.0.0" || true

      - name: Create Release
        id: create_release
        run: |
          RESPONSE=$(curl -s -X POST -H "Authorization: token ${{ secrets.TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "v1.0.0",
              "name": "UDYATSTREAM v1.0.0",
              "body": "Automatic release with build artifacts for all platforms.\n- Android: APK\n- iOS: IPA\n- Windows: ZIP\n- Linux: ZIP\n- macOS: ZIP",
              "draft": false,
              "prerelease": false
            }' \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Release ID: $RELEASE_ID"
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload Android APK
        run: |
          if [ -f "UDYATSTREAM-android.apk" ]; then
            curl -s -X POST -H "Authorization: token ${{ secrets.TOKEN }}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"UDYATSTREAM-android.apk" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=UDYATSTREAM-android.apk"
            echo "Android uploaded"
          else
            echo "Android: NOT FOUND"
          fi

      - name: Upload Windows
        run: |
          if [ -f "UDYATSTREAM-windows.zip" ]; then
            curl -s -X POST -H "Authorization: token ${{ secrets.TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary @"UDYATSTREAM-windows.zip" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=UDYATSTREAM-windows.zip"
            echo "Windows uploaded"
          else
            echo "Windows: NOT FOUND"
          fi

      - name: Upload iOS
        run: |
          if [ -f "UDYATSTREAM-ios.ipa" ]; then
            curl -s -X POST -H "Authorization: token ${{ secrets.TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary @"UDYATSTREAM-ios.ipa" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=UDYATSTREAM-ios.ipa"
            echo "iOS uploaded"
          else
            echo "iOS: NOT FOUND"
          fi

      - name: Upload Linux
        run: |
          if [ -f "UDYATSTREAM-linux.zip" ]; then
            curl -s -X POST -H "Authorization: token ${{ secrets.TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary @"UDYATSTREAM-linux.zip" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=UDYATSTREAM-linux.zip"
            echo "Linux uploaded"
          else
            echo "Linux: NOT FOUND"
          fi

      - name: Upload macOS
        run: |
          if [ -f "UDYATSTREAM-macos.zip" ]; then
            curl -s -X POST -H "Authorization: token ${{ secrets.TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary @"UDYATSTREAM-macos.zip" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=UDYATSTREAM-macos.zip"
            echo "macOS uploaded"
          else
            echo "macOS: NOT FOUND"
          fi

      - name: Verify Release Assets
        run: |
          echo "=== Verifying release assets ==="
          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets")
          echo "$ASSETS" | jq -r '.[] | .name'