name: udyatstream_app
description: "UDYATSTREAM - WebView App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.41.6

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: "launcher"
  ios: true
  image_path: "logo.webp"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "logo.webp"

flutter:
  uses-material-design: true
  assets:
    - logo-light.png
