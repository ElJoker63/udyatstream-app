name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Flutter version
        run: flutter --version

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --debug

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign || flutter build ios --debug --no-codesign

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/Release/bundle

      - name: Upload iOS
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/udyatstream_app.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android
        continue-on-error: true

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows
        continue-on-error: true

      - name: Download iOS
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/ios
        continue-on-error: true

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux
        continue-on-error: true

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/macos
        continue-on-error: true

      - name: Create Windows zip
        run: |
          if [ -d "release/windows" ]; then
            cd release/windows
            zip -r ../../UDYATSTREAM-windows.zip .
          fi

      - name: Create Linux zip
        run: |
          if [ -d "release/linux" ]; then
            cd release/linux
            zip -r ../../UDYATSTREAM-linux.zip .
          fi

      - name: Create macOS zip
        run: |
          if [ -d "release/macos" ]; then
            cd release/macos
            zip -r ../../UDYATSTREAM-macos.zip .
          fi

      - name: Create iOS tar.gz
        run: |
          if [ -d "release/ios" ]; then
            cd release/ios
            tar -czf ../../UDYATSTREAM-ios.tar.gz .
          fi

      - name: Create Release via API
        shell: bash
        run: |
          set -x
          echo "=== Current directory ===" 
          pwd
          echo ""
          echo "=== Auth check ==="
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user | grep -o '"login":"[^"]*"'
          echo ""
          echo "=== Checking each file explicitly ==="
          for f in release/android/app-debug.apk release/windows/UDYATSTREAM-windows.zip release/linux/UDYATSTREAM-linux.zip release/macos/UDYATSTREAM-macos.zip release/ios/UDYATSTREAM-ios.tar.gz; do
            if [ -f "$f" ]; then
              echo "EXISTS: $f ($(ls -lh $f | awk '{print $5}'))"
            else
              echo "NOT FOUND: $f"
            fi
          done
          
          # Create release via API - check if we can
          echo ""
          echo "=== Creating release ==="
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{
              "tag_name": "v1.0.0",
              "name": "UDYATSTREAM v1.0.0",
              "body": "Automatic release with all platform builds",
              "draft": false,
              "prerelease": false
            }' \
            https://api.github.com/repos/ElJoker63/udyatstream-app/releases)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"
          
          # Check if release was created
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "422" ]; then
            echo "Release endpoint accessed"
            # Get release by tag
            TAG_RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/ElJoker63/udyatstream-app/releases/tags/v1.0.0)
            echo "Tag response: $TAG_RESPONSE"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}