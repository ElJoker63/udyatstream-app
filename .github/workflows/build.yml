name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Flutter version
        run: flutter --version

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --debug

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign || flutter build ios --debug --no-codesign

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/Release/bundle

      - name: Upload iOS
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/udyatstream_app.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android
        continue-on-error: true

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows
        continue-on-error: true

      - name: Download iOS
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/ios
        continue-on-error: true

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux
        continue-on-error: true

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/macos
        continue-on-error: true

      - name: Create Windows zip
        run: |
          if [ -d "release/windows" ]; then
            cd release/windows
            zip -r ../../UDYATSTREAM-windows.zip .
          fi

      - name: Create Linux zip
        run: |
          if [ -d "release/linux" ]; then
            cd release/linux
            zip -r ../../UDYATSTREAM-linux.zip .
          fi

      - name: Create macOS zip
        run: |
          if [ -d "release/macos" ]; then
            cd release/macos
            zip -r ../../UDYATSTREAM-macos.zip .
          fi

      - name: Create iOS tar.gz
        run: |
          if [ -d "release/ios" ]; then
            cd release/ios
            tar -czf ../../UDYATSTREAM-ios.tar.gz .
          fi

      - name: Create Release via API
        shell: bash
        run: |
          echo "=== Current directory ===" 
          pwd
          echo ""
          echo "=== Checking each file explicitly ==="
          for f in release/android/app-debug.apk release/windows/UDYATSTREAM-windows.zip release/linux/UDYATSTREAM-linux.zip release/macos/UDYATSTREAM-macos.zip release/ios/UDYATSTREAM-ios.tar.gz; do
            if [ -f "$f" ]; then
              echo "EXISTS: $f ($(ls -lh $f | awk '{print $5}'))"
            else
              echo "NOT FOUND: $f"
            fi
          done
          
          # Create release via API - ignore if already exists
          echo ""
          echo "=== Creating release ==="
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{
              "tag_name": "v1.0.0",
              "name": "UDYATSTREAM v1.0.0",
              "body": "Automatic release with all platform builds",
              "draft": false,
              "prerelease": false
            }' \
            https://api.github.com/repos/ElJoker63/udyatstream-app/releases) || true
          
          echo "Release response: $RESPONSE"
          
          # Handle case where release might already exist or response is different
          RELEASE_ID=$(echo $RESPONSE | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2) || true
          if [ -z "$RELEASE_ID" ]; then
            # Try to get existing release
            RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/ElJoker63/udyatstream-app/releases/tags/v1.0.0 | \
              grep -o '"id":[0-9]*' | head -1 | cut -d: -f2) || true
          fi
          echo "Release ID: $RELEASE_ID"
          
          if [ -n "$RELEASE_ID" ]; then
            # Upload assets - try zip first then others
            echo "=== Uploading assets ==="
            # Upload as zip files
            if [ -f "release/windows/UDYATSTREAM-windows.zip" ]; then
              echo "Uploading Windows..."
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/zip" \
                --data-binary @"release/windows/UDYATSTREAM-windows.zip" \
                "https://uploads.github.com/repos/ElJoker63/udyatstream-app/releases/$RELEASE_ID/assets?name=UDYATSTREAM-windows.zip" || echo "Windows upload failed"
            fi
            if [ -f "release/linux/UDYATSTREAM-linux.zip" ]; then
              echo "Uploading Linux..."
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/zip" \
                --data-binary @"release/linux/UDYATSTREAM-linux.zip" \
                "https://uploads.github.com/repos/ElJoker63/udyatstream-app/releases/$RELEASE_ID/assets?name=UDYATSTREAM-linux.zip" || echo "Linux upload failed"
            fi
            if [ -f "release/macos/UDYATSTREAM-macos.zip" ]; then
              echo "Uploading macOS..."
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/zip" \
                --data-binary @"release/macos/UDYATSTREAM-macos.zip" \
                "https://uploads.github.com/repos/ElJoker63/udyatstream-app/releases/$RELEASE_ID/assets?name=UDYATSTREAM-macos.zip" || echo "macOS upload failed"
            fi
            if [ -f "release/ios/UDYATSTREAM-ios.tar.gz" ]; then
              echo "Uploading iOS..."
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/gzip" \
                --data-binary @"release/ios/UDYATSTREAM-ios.tar.gz" \
                "https://uploads.github.com/repos/ElJoker63/udyatstream-app/releases/$RELEASE_ID/assets?name=UDYATSTREAM-ios.tar.gz" || echo "iOS upload failed"
            fi
            if [ -f "release/android/app-debug.apk" ]; then
              echo "Uploading Android..."
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/vnd.android.package-archive" \
                --data-binary @"release/android/app-debug.apk" \
                "https://uploads.github.com/repos/ElJoker63/udyatstream-app/releases/$RELEASE_ID/assets?name=app-debug.apk" || echo "Android upload failed"
            fi
            echo "=== Done ==="
          else
            echo "Failed to get release ID"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}