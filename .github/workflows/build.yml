name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get dependencies
        run: flutter pub get

      - name: Flutter version
        run: flutter --version

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --debug

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign || flutter build ios --debug --no-codesign

      - name: Create iOS IPA
        if: matrix.platform == 'ios'
        run: |
          xcodebuild -exportArchive -archivePath build/ios/iphoneos/Runner.xcarchive \
            -exportOptionsPlist build/ios/ExportOptions.plist \
            -exportPath build/ios/iphoneos/Runner.ipa 2>/dev/null || \
          echo "Using app bundle as IPA"
          ls -la build/ios/iphoneos/

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/Release/bundle

      - name: Upload iOS
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/udyatstream_app.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android
        continue-on-error: true

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows
        continue-on-error: true

      - name: Download iOS
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/ios
        continue-on-error: true

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux
        continue-on-error: true

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/macos
        continue-on-error: true

      - name: Create Windows zip
        run: |
          if [ -d "release/windows" ]; then
            cd release/windows
            zip -r ../../UDYATSTREAM-windows.zip .
          fi

      - name: Create Linux zip
        run: |
          if [ -d "release/linux" ]; then
            cd release/linux
            zip -r ../../UDYATSTREAM-linux.zip .
          fi

      - name: Create macOS zip
        run: |
          if [ -d "release/macos" ]; then
            cd release/macos
            zip -r ../../UDYATSTREAM-macos.zip .
          fi

      - name: Create iOS archive (tar.gz)
        run: |
          if [ -d "release/ios" ]; then
            cd release/ios
            tar -czf ../UDYATSTREAM-ios.tar.gz .
          fi

      - name: List release files
        run: |
          ls -la
          echo "=== Checking files ==="
          [ -f "release/android/app-debug.apk" ] && echo "Android: OK" || echo "Android: MISSING"
          [ -f "UDYATSTREAM-windows.zip" ] && echo "Windows: OK" || echo "Windows: MISSING"
          [ -f "UDYATSTREAM-linux.zip" ] && echo "Linux: OK" || echo "Linux: MISSING"
          [ -f "UDYATSTREAM-macos.zip" ] && echo "macOS: OK" || echo "macOS: MISSING"
          [ -f "UDYATSTREAM-ios.tar.gz" ] && echo "iOS: OK" || echo "iOS: MISSING"

      - name: Delete existing release
        run: |
          gh release delete v1.0.0 --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: v1.0.0
          release_name: "UDYATSTREAM v1.0.0"
          body: |
            Automatic release with build artifacts for all platforms.
            - Android: APK
            - iOS: tar.gz
            - Windows: zip
            - Linux: zip
            - macOS: zip
          draft: false
          prerelease: false

      - name: Upload Android APK
        run: |
          if [ -f "release/android/app-debug.apk" ]; then
            gh release upload v1.0.0 "release/android/app-debug.apk" --clobber
            echo "Android uploaded"
          else
            echo "Android: NOT FOUND"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload Windows
        run: |
          if [ -f "UDYATSTREAM-windows.zip" ]; then
            gh release upload v1.0.0 UDYATSTREAM-windows.zip --clobber
            echo "Windows uploaded"
          else
            echo "Windows: NOT FOUND"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload Linux
        run: |
          if [ -f "UDYATSTREAM-linux.zip" ]; then
            gh release upload v1.0.0 UDYATSTREAM-linux.zip --clobber
            echo "Linux uploaded"
          else
            echo "Linux: NOT FOUND"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload macOS
        run: |
          if [ -f "UDYATSTREAM-macos.zip" ]; then
            gh release upload v1.0.0 UDYATSTREAM-macos.zip --clobber
            echo "macOS uploaded"
          else
            echo "macOS: NOT FOUND"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload iOS
        run: |
          if [ -f "UDYATSTREAM-ios.tar.gz" ]; then
            gh release upload v1.0.0 UDYATSTREAM-ios.tar.gz --clobber
            echo "iOS uploaded"
          else
            echo "iOS: NOT FOUND"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}