name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/Release/bundle

      - name: Upload iOS
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/udyatstream_app.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows

      - name: Download iOS
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/ios

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/macos

      - name: Create Windows zip
        run: |
          cd release/windows
          zip -r ../../UDYATSTREAM-windows.zip .

      - name: Create Linux zip
        run: |
          cd release/linux
          zip -r ../../UDYATSTREAM-linux.zip .

      - name: Create macOS zip
        run: |
          cd release/macos
          zip -r ../../UDYATSTREAM-macos.zip .

      - name: Create iOS tar.gz
        run: |
          cd release/ios
          tar -czf ../../UDYATSTREAM-ios.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/android/app-release.apk
            UDYATSTREAM-windows.zip
            UDYATSTREAM-linux.zip
            UDYATSTREAM-macos.zip
            UDYATSTREAM-ios.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}