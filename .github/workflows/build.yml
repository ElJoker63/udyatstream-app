name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Flutter version
        run: flutter --version

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --debug

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign || flutter build ios --debug --no-codesign

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/Release/bundle

      - name: Upload iOS
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/udyatstream_app.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android
        continue-on-error: true

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows
        continue-on-error: true

      - name: Download iOS
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: release/ios
        continue-on-error: true

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux
        continue-on-error: true

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release/macos
        continue-on-error: true

      - name: Create Windows zip
        run: |
          if [ -d "release/windows" ]; then
            cd release/windows
            zip -r ../../UDYATSTREAM-windows.zip .
          fi

      - name: Create Linux zip
        run: |
          if [ -d "release/linux" ]; then
            cd release/linux
            zip -r ../../UDYATSTREAM-linux.zip .
          fi

      - name: Create macOS zip
        run: |
          if [ -d "release/macos" ]; then
            cd release/macos
            zip -r ../../UDYATSTREAM-macos.zip .
          fi

      - name: Create iOS tar.gz
        run: |
          if [ -d "release/ios" ]; then
            cd release/ios
            tar -czf ../../UDYATSTREAM-ios.tar.gz .
          fi

      - name: List release files
        run: |
          echo "=== release/ ==="
          ls -la release/ 2>/dev/null || true
          echo "=== release/android/ ==="
          ls -la release/android/ 2>/dev/null || true
          echo "=== release/windows/ ==="
          ls -la release/windows/ 2>/dev/null || true
          echo "=== release/linux/ ==="
          ls -la release/linux/ 2>/dev/null || true
          echo "=== release/macos/ ==="
          ls -la release/macos/ 2>/dev/null || true
          echo "=== release/ios/ ==="
          ls -la release/ios/ 2>/dev/null || true
          echo "=== Root directory ==="
          ls -la *.apk *.zip *.tar.gz 2>/dev/null || true

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Check files
            const files = ['app-debug.apk', 'UDYATSTREAM-windows.zip', 'UDYATSTREAM-linux.zip', 'UDYATSTREAM-macos.zip', 'UDYATSTREAM-ios.tar.gz'];
            console.log('=== Checking files ===');
            for (const f of files) {
              if (fs.existsSync(f)) {
                const stats = fs.statSync(f);
                console.log(`FOUND: ${f} (${stats.size} bytes)`);
              } else {
                console.log(`MISSING: ${f}`);
              }
            }
            
            // Create release
            console.log('=== Creating release ===');
            try {
              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'v1.0.0',
                name: 'UDYATSTREAM v1.0.0',
                body: 'Automatic release with build artifacts',
                draft: false,
                prerelease: false
              });
              console.log('Release created:', release.data.id);
              
              // Upload assets
              console.log('=== Uploading assets ===');
              for (const f of files) {
                if (fs.existsSync(f)) {
                  console.log(`Uploading ${f}...`);
                  const data = fs.readFileSync(f);
                  try {
                    await github.rest.repos.uploadReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: release.data.id,
                      name: path.basename(f),
                      data: data
                    });
                    console.log(`Uploaded: ${f}`);
                  } catch (e) {
                    console.log(`Upload failed: ${f}`, e.message);
                  }
                }
              }
            } catch (e) {
              console.log('Error:', e.message);
            }
            
            // List releases
            console.log('=== Current releases ===');
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            console.log(releases.data.map(r => r.name).join(', '));